<style>
        body { font-family: 'Be Vietnam Pro', sans-serif; }
        
        .fade-in-up {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .pulse-logo {
            animation: pulseLogo 3s ease-in-out infinite;
        }

        @keyframes pulseLogo {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 4px 12px rgba(15, 118, 110, 0.15)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 8px 24px rgba(15, 118, 110, 0.25)); }
        }

        .dark .pulse-logo {
            animation: pulseLogoDark 3s ease-in-out infinite;
        }

        @keyframes pulseLogoDark {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(20, 184, 166, 0.4)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 35px rgba(20, 184, 166, 0.6)); }
        }

        .progress-bar-fill {
            width: 0%;
            transition: width 3s ease-in-out;
        }

        .loading-shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
    </style>
</head>
<body class="bg-surface-container-lowest m-0 p-0 overflow-hidden">
<!-- SPLASH SCREEN COMPARISON CANVAS -->
<main class="flex h-screen w-full flex-col md:flex-row">
<!-- LIGHT THEME VERSION -->
<section class="relative flex-1 flex flex-col items-center justify-center overflow-hidden bg-white">
<!-- Gradient Overlay -->
<div class="absolute inset-0 opacity-30" style="background: linear-gradient(to bottom, #FFFFFF 0%, #CCFBF1 50%, #FFFFFF 100%);"></div>
<!-- Content Container -->
<div class="relative z-10 flex flex-col items-center">
<!-- Logo -->
<div class="mb-2xl fade-in-up" style="animation-delay: 0.1s;">
<div class="pulse-logo">
<img alt="Logo" class="w-32 h-32 object-contain" src="https://lh3.googleusercontent.com/aida/AP1WRLttFuA6AWl4cjTIAFo_W2y7tSmTW0Apkk6S03OAtjtuLqaoWMH4mWUtRB75_M_BXwzkTPjrpCkXmkHluEZB9nYJY6PL1-H0s7cZdX2poxKJIDrUQtNhf36ThPeaFcniqCsuqkU-bbRiXNoxQctqt9qlpwvOgyLIVuAlG6EmeZYuA8LTQEsLLPdwQGFgrCR15hyTF9D3BOwtqspJg2V1x8IKHka5mzyMOmQhP37HCFy2qrbBXim5LN5j7UQ">
</div>
</div>
<!-- App Name -->
<h1 class="font-poppins text-headline-lg text-[#0F766E] font-bold mb-xs fade-in-up" style="animation-delay: 0.4s;">
                    E-Commerce
                </h1>
<!-- Tagline -->
<p class="font-label-lg text-body-md text-[#6B7280] fade-in-up" style="animation-delay: 0.6s;">
                    Premium Shopping Experience
                </p>
</div>
<!-- Loading Indicator -->
<div class="absolute bottom-4xl w-48 h-1 bg-gray-100 rounded-full overflow-hidden fade-in-up" style="animation-delay: 0.8s;">
<div class="h-full progress-bar-fill loading-shimmer rounded-full" id="progress-light" style="background-color: #0F766E;"></div>
</div>
<!-- Label Indicator (Internal Design Review Only) -->
</section>
<!-- DARK THEME VERSION -->
</main>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const bars = document.querySelectorAll('.progress-bar-fill');
            
            function animateProgress() {
                bars.forEach(bar => {
                    // Reset to 0 for looping effect
                    bar.style.transition = 'none';
                    bar.style.width = '0%';
                    
                    // Force reflow
                    void bar.offsetWidth;
                    
                    // Animate to 100%
                    bar.style.transition = 'width 3s ease-in-out';
                    bar.style.width = '100%';
                });
            }

            // Initial call
            setTimeout(animateProgress, 500);

            // Optional: Loop the animation every 4 seconds to simulate continuous loading
            setInterval(animateProgress, 4000);

            // Hover effect for logos
            const logos = document.querySelectorAll('.pulse-logo img');
            logos.forEach(logo => {
                logo.addEventListener('mouseover', () => {
                    logo.parentElement.style.animationPlayState = 'paused';
                    logo.style.transform = 'scale(1.15) rotate(2deg)';
                    logo.style.transition = 'transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                });
                logo.addEventListener('mouseout', () => {
                    logo.parentElement.style.animationPlayState = 'running';
                    logo.style.transform = '';
                });
            });
        });
    </script>
