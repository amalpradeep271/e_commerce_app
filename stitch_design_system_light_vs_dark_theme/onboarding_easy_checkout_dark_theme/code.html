<h1 class="font-title-lg text-title-lg text-primary dark:text-inverse-primary">Step 1 of 3</h1>

</header>
<!-- Main Content Canvas -->

</div>
<!-- Text Content -->

<h2 class="font-display-lg text-display-lg text-on-surface tracking-tight">
                Seamless Checkout
            </h2>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-[280px] mx-auto">
                Apply coupons, save addresses, and pay securely
            </p>
</div>

<div class="grid grid-cols-2 gap-sm w-full mt-4">

</div>
<div class="glass-card p-md rounded-2xl flex flex-col items-start gap-xs mt-4">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">shield_lock</span>
<span class="font-label-md text-on-surface">Secure Pay</span>
</div>
</div>

<!-- Navigation & Action Section -->

<style>
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.8s ease-out forwards;
        }
    </style>
<script>
        // Simple micro-interaction for the button
        const nextBtn = document.querySelector('button.bg-\\[\\#14B8A6\\]');
        nextBtn.addEventListener('mousedown', () => {
            nextBtn.style.transform = 'scale(0.97)';
        });
        nextBtn.addEventListener('mouseup', () => {
            nextBtn.style.transform = 'scale(1)';
        });
        nextBtn.addEventListener('mouseleave', () => {
            nextBtn.style.transform = 'scale(1)';
        });
    </script>
