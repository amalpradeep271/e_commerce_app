<script>
        // Password visibility toggle
        const passwordInput = document.getElementById('password');
        const toggleBtn = document.getElementById('toggle-password');
        
        toggleBtn.addEventListener('click', () => {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            toggleBtn.textContent = isPassword ? 'visibility_off' : 'visibility';
        });

        // Simple Password Strength Logic
        passwordInput.addEventListener('input', (e) => {
            const val = e.target.value;
            const bar = document.getElementById('strength-bar');
            const text = document.getElementById('strength-text');
            
            let strength = 0;
            if (val.length > 5) strength += 25;
            if (val.match(/[A-Z]/)) strength += 25;
            if (val.match(/[0-9]/)) strength += 25;
            if (val.match(/[^A-Za-z0-9]/)) strength += 25;

            bar.style.width = strength + '%';

            if (strength <= 25) {
                bar.className = 'strength-bar h-full bg-error';
                text.textContent = val.length > 0 ? 'Weak' : 'None';
                text.className = 'font-caption text-caption font-semibold text-error';
            } else if (strength <= 50) {
                bar.className = 'strength-bar h-full bg-tertiary';
                text.textContent = 'Fair';
                text.className = 'font-caption text-caption font-semibold text-tertiary';
            } else if (strength <= 75) {
                bar.className = 'strength-bar h-full bg-primary';
                text.textContent = 'Good';
                text.className = 'font-caption text-caption font-semibold text-primary';
            } else {
                bar.className = 'strength-bar h-full bg-[#0F766E]';
                text.textContent = 'Strong';
                text.className = 'font-caption text-caption font-semibold text-[#0F766E]';
            }
        });

        // Simple button interaction
        const form = document.getElementById('signup-form');
        form.addEventListener('submit', (e) => {
            const btn = form.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> Processing...';
            btn.disabled = true;
            
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }, 1500);
        });
    </script>
