<style>
        body { font-family: 'Be Vietnam Pro', sans-serif; }
        
        .fade-in-up {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .pulse-logo {
            animation: pulseLogoDark 3s ease-in-out infinite;
        }

        @keyframes pulseLogoDark {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 15px rgba(20, 184, 166, 0.3)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 25px rgba(20, 184, 166, 0.5)); }
        }

        .progress-bar-fill {
            width: 0%;
            transition: width 3s ease-in-out;
        }

        .loading-shimmer {
            background: linear-gradient(90deg, transparent, rgba(20, 184, 166, 0.4), transparent);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
    </style>
</head>
<body class="m-0 p-0 overflow-hidden bg-[#0F172A]">
<main class="relative h-screen w-full flex flex-col items-center justify-center overflow-hidden">
<!-- Background Gradient -->
<div class="absolute inset-0 z-0" style="background: linear-gradient(to bottom, #0F172A 0%, rgba(15, 118, 110, 0.2) 50%, #0F172A 100%);"></div>
<!-- Content Container (Perfectly Centered) -->

<!-- Logo -->
<div class="mb-3xl fade-in-up" style="animation-delay: 0.1s;">
<div class="pulse-logo">
<img alt="E-Commerce Logo" class="w-24 h-24 object-contain brightness-0 invert-[.7] sepia-[1] saturate-[10] hue-rotate-[130deg]" src="https://lh3.googleusercontent.com/aida/AP1WRLttFuA6AWl4cjTIAFo_W2y7tSmTW0Apkk6S03OAtjtuLqaoWMH4mWUtRB75_M_BXwzkTPjrpCkXmkHluEZB9nYJY6PL1-H0s7cZdX2poxKJIDrUQtNhf36ThPeaFcniqCsuqkU-bbRiXNoxQctqt9qlpwvOgyLIVuAlG6EmeZYuA8LTQEsLLPdwQGFgrCR15hyTF9D3BOwtqspJg2V1x8IKHka5mzyMOmQhP37HCFy2qrbBXim5LN5j7UQ">

                E-Commerce
            </h1>
<!-- Tagline -->
<p class="font-poppins text-[14px] leading-[20px] text-[#94A3B8] fade-in-up" style="animation-delay: 0.5s;">
                Premium Shopping Experience
            </p>
</div>
<!-- Loading Indicator (Bottom) -->
<div class="absolute bottom-5xl w-40 h-[2px] bg-white/10 rounded-full overflow-hidden fade-in-up" style="animation-delay: 0.7s;">
<div class="h-full progress-bar-fill loading-shimmer rounded-full" id="progress-bar" style="background-color: #14B8A6;"></div>
</div>
</main>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const bar = document.getElementById('progress-bar');
            
            function animateProgress() {
                // Reset to 0
                bar.style.transition = 'none';
                bar.style.width = '0%';
                
                // Force reflow
                void bar.offsetWidth;
                
                // Animate to 100%
                bar.style.transition = 'width 3s ease-in-out';
                bar.style.width = '100%';
            }

            // Initial call
            setTimeout(animateProgress, 500);

            // Loop the animation
            setInterval(animateProgress, 4000);
        });
    </script>
