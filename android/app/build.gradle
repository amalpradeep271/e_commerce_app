plugins {
    id "com.android.application"
    // START: FlutterFire Configuration
    id 'com.google.gms.google-services'
    // END: FlutterFire Configuration
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def dartEnvironmentVariables = [:]
if (project.hasProperty('dart-defines')) {
    def dartDefinesString = project.property('dart-defines')
    dartDefinesString.split(',').each { define ->
        if (define) {
            try {
                def decoded = new String(define.decodeBase64(), 'UTF-8')
                if (decoded.contains('=')) {
                    def pair = decoded.split('=')
                    if (pair.size() == 2) {
                        dartEnvironmentVariables[pair[0]] = pair[1]
                    }
                } else if (define.contains('=')) {
                    def pair = define.split('=')
                    if (pair.size() == 2) {
                        dartEnvironmentVariables[pair[0]] = pair[1]
                    }
                }
            } catch (Exception e) {
                if (define.contains('=')) {
                    def pair = define.split('=')
                    if (pair.size() == 2) {
                        dartEnvironmentVariables[pair[0]] = pair[1]
                    }
                }
            }
        }
    }
}

android {
    namespace = "com.example.e_commerce_application"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = "28.2.13676358"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_11
        targetCompatibility = JavaVersion.VERSION_11
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_11
    }

    defaultConfig {
        def baseAppId = "com.example.e_commerce_application"
        def appName = "E-Commerce"
        def appIcon = "@mipmap/logo"
        if (dartEnvironmentVariables.containsKey('TENANT_SLUG')) {
            def slug = dartEnvironmentVariables['TENANT_SLUG'].toLowerCase().replaceAll("[^a-z0-9_.]", "_")
            applicationId = "${baseAppId}.${slug}"
            if (slug == 'irinjalakuda_khadi') {
                appName = "Irinjalakuda Khadi"
            } else if (slug == 'shopify') {
                appName = "Shopify"
                appIcon = "@mipmap/shopify_logo"
            } else {
                appName = slug.capitalize()
            }
        } else {
            applicationId = baseAppId
        }

        manifestPlaceholders += [
            appLabel: appName,
            appIcon: appIcon
        ]

        minSdkVersion = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source = "../.."
}
